name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
  workflow_dispatch:

jobs:
  test:
    name: Elixir Tests
    permissions:
      actions: read
      contents: read
      pull-requests: write
    # Pinned to main: the `services:` input (used below for Mosquitto) is not yet
    # part of a tagged release. Bump to a tag once one is cut that includes it.
    uses: intility/reusable-elixir/.github/workflows/elixir-test.yaml@fe7faf5b1c146402e7e9ad9f940566c21c7a19de # main
    with:
      otp-version: "28.3"
      elixir-version: "1.19.4"
      dialyzer: true
      sobelow: false
      # NOTE: `${{ github.workspace }}` is not available in a reusable workflow
      # call's `with:` block, so the host path is hardcoded to the standard
      # GitHub-hosted runner layout: /home/runner/work/<repo>/<repo>.
      services: |
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports: |
            1883:1883
            1884:1884
            8883:8883
            8884:8884
            8885:8885
          volumes: |
            /home/runner/work/off_broadway_emqtt/off_broadway_emqtt/.mosquitto:/mosquitto/config
            /home/runner/work/off_broadway_emqtt/off_broadway_emqtt/.mosquitto/certs:/mosquitto/certs
          health-cmd: mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok
          health-timeout: 30
