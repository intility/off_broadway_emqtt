name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
  workflow_dispatch:

jobs:
  test:
    name: Elixir Tests
    permissions:
      actions: read
      contents: read
      pull-requests: write
    # Pinned to main: the `services:` input (used below for Mosquitto) is not yet
    # part of a tagged release. Bump to a tag once one is cut that includes it.
    uses: intility/reusable-elixir/.github/workflows/elixir-test.yaml@c1f36ae1c44df941ab51b34540cae89193c0bb3c # main
    with:
      otp-version: "28.3"
      elixir-version: "1.19.4"
      dialyzer: true
      sobelow: false
      # `${{ github.workspace }}` is NOT usable here: the expression is evaluated
      # at reusable-workflow-call time, before any runner is assigned, and
      # resolves to the empty string. Use the shell env var $GITHUB_WORKSPACE
      # instead; the action expands env-var references in volume paths at runtime.
      services: |
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports: |
            1883:1883
            1884:1884
            8883:8883
            8884:8884
            8885:8885
          volumes: |
            $GITHUB_WORKSPACE/.mosquitto:/mosquitto/config
            $GITHUB_WORKSPACE/.mosquitto/certs:/mosquitto/certs
          health-cmd: mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok
          health-timeout: 30
