name: Elixir CI

on:
  pull_request:
  push:
    branches: ["main"]

env:
  MIX_ENV: test
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.14"
            otp: "24.3"

          - elixir: "1.19.5"
            otp: "28.4.2"
            lint: lint
            coverage: coverage
    steps:
      - name: Check out this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate certificates for testing
        run: |
          chmod +x .mosquitto/certs/generate_certs.sh
          cd .mosquitto/certs && ./generate_certs.sh

      - name: Start the Mosquitto MQTT broker
        run: |
          docker run \
          --detach \
          --name mqtt \
          -v ${{ github.workspace }}/.mosquitto:/mosquitto/config \
          -v ${{ github.workspace }}/.mosquitto/certs:/mosquitto/certs \
          -p 1883:1883 \
          -p 1884:1884 \
          -p 8883:8883 \
          -p 8884:8884 \
          -p 8885:8885 \
          eclipse-mosquitto:2.0 \
          mosquitto -c /mosquitto/config/mosquitto.conf

      - name: Wait for Mosquitto to be ready
        run: |
          for i in {1..30}; do
            if docker logs mqtt 2>&1 | grep -q "mosquitto version .* running"; then
              echo "Mosquitto is ready!"
              break
            fi
            echo "Waiting for Mosquitto to start... ($i/30)"
            sleep 2
          done
          docker logs mqtt

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache Mix dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-deps
        with:
          path: |
            deps
            _build
          key: |
            mix-${{ runner.os }}-${{matrix.elixir}}-${{matrix.otp}}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{matrix.elixir}}-${{matrix.otp}}-

      - run: mix do deps.get --check-locked, deps.compile
        if: steps.cache-deps.outputs.cache-hit != 'true'

      - run: mix format --check-formatted
        if: ${{ matrix.lint }}

      - run: mix deps.unlock --check-unused
        if: ${{ matrix.lint }}

      - run: mix compile --warnings-as-errors
        if: ${{ matrix.lint }}

      - run: mix credo --strict
        if: ${{ matrix.lint }}

      - run: mix test --include requires_mqtt
        if: ${{ !matrix.lint && !matrix.coverage }}

      - run: mix coveralls --include requires_mqtt
        if: ${{ matrix.coverage }}
